server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 10m;

        # Large in-memory buffers so big boundary/transcript responses
        # never spill to disk (eliminates the "buffered to a temporary file" warnings).
        proxy_buffering        on;
        proxy_buffer_size      128k;
        proxy_buffers          16 1m;
        proxy_busy_buffers_size 2m;
    }

    # Hashed static assets — serve directly; never fall back to index.html.
    # Vite fingerprints every file in /assets/ so a 404 here means the Docker
    # image is stale (use --no-cache to force a clean rebuild).
    location /assets/ {
        try_files $uri =404;
    }

    # SPA fallback for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
